# CI Pipeline — Product Catalog
# Comprehensive CI workflow: lint, test, build, bundle check, dependency audit, lighthouse.
#
# Triggers on PRs to main and pushes.
# Only fails on critical threshold violations.

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Unit Tests with Coverage
        run: npm run test:ci

      - name: Upload Coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Production Build
        run: npm run build:production

      - name: Upload Production Build
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/product-catalog/browser
          retention-days: 3

  bundle-check:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build with Stats
        run: npm run bundle:stats

      - name: Verify Bundle Budgets
        run: |
          echo "Bundle build completed successfully."
          echo "Angular CLI enforces bundle budgets."

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high || true

      - name: Check Outdated Packages
        run: npm outdated || true

  lighthouse:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Download Production Build
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist/product-catalog/browser

      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun --config=lighthouserc.json || true

      - name: Upload Lighthouse Report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: reports/lighthouse/
          retention-days: 7