<div class="shell">
  <app-header (menuToggle)="toggleSidenav()" />

  <mat-sidenav-container class="shell__container">
    <mat-sidenav
      [opened]="sidenavOpen()"
      (openedChange)="sidenavOpen.set($event)"
      mode="over"
      class="shell__sidenav"
    >
      <app-navigation (linkClicked)="closeSidenav()" />
    </mat-sidenav>

    <mat-sidenav-content class="shell__content">
      <app-error-state />

      <main class="shell__main">
        <router-outlet />
      </main>

      <app-footer />
    </mat-sidenav-content>
  </mat-sidenav-container>

  <app-loading-spinner [overlay]="true" />
</div>
