@if (loadingService.loading()) {
  @if (overlay()) {
    <div class="loading-overlay" role="alert" aria-busy="true" aria-label="Loading content">
      <mat-spinner [diameter]="diameter()" />
    </div>
  } @else {
    <div class="loading-inline" role="alert" aria-busy="true" aria-label="Loading content">
      <mat-spinner [diameter]="diameter()" />
    </div>
  }
}
