@if (errorService.error(); as error) {
  <div class="error-state" role="alert">
    <mat-icon class="error-state__icon" aria-hidden="true">error_outline</mat-icon>

    <h3 class="error-state__title">Something went wrong</h3>

    <p class="error-state__message">{{ error.message }}</p>

    <button
      mat-flat-button
      color="primary"
      class="error-state__retry"
      (click)="onRetry()"
    >
      <mat-icon>refresh</mat-icon>
      Try again
    </button>
  </div>
}
